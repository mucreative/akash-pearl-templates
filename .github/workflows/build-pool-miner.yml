name: Build Pool Miner Image

on:
  push:
    branches:
      - main
    paths:
      - "pool-miner/**"
      - ".github/workflows/build-pool-miner.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pool-miner/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pearl-pool-miner-akash:latest
            ghcr.io/${{ github.repository_owner }}/pearl-pool-miner-akash:${{ github.sha }}
